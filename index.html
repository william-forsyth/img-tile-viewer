<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>img tile viewer</title>
<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0e0e0e;
    --surface: rgba(0, 0, 0, 0.72);
    --text-dim: #555;
    --text-mid: #888;
    --text-bright: #bbb;
    --border-dim: #2a2a2a;
    --control-bg: #1a1a1a;
    --control-hover: #252525;
    --accent: #666;
    --transition-fast: 180ms;
    --transition-grid: 350ms;
    --sidebar-width: 220px;
    --sidebar-bg: #111111;
    --sidebar-border: #1e1e1e;
    --sidebar-active-bg: #1c2a3a;
    --sidebar-active-border: #4a9eff;
    --sidebar-active-color: #4a9eff;
    --sidebar-root-icon: #e8a040;
  }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace;
    color: var(--text-mid);
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    flex-direction: column;
  }

  #app-layout {
    flex: 1;
    display: flex;
    flex-direction: row;
    overflow: hidden;
    min-height: 0;
  }

  #main-area {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-width: 0;
  }

  /* ── Drop Zone ── */

  #drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    cursor: pointer;
    transition: opacity 0.3s ease;
  }

  #drop-zone.hidden {
    opacity: 0;
    pointer-events: none;
  }

  #drop-zone-layout {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  #drop-zone-inner {
    width: 340px;
    height: 180px;
    border: 1px solid var(--border-dim);
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: border-color var(--transition-fast) ease, background var(--transition-fast) ease;
  }

  #drop-zone-inner:hover {
    border-color: #3a3a3a;
    background: rgba(255, 255, 255, 0.015);
  }

  #drop-zone.drag-over #drop-zone-inner {
    border-color: var(--text-mid);
    background: rgba(255, 255, 255, 0.02);
  }

  #drop-zone-inner .drop-label {
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    transition: color var(--transition-fast) ease;
  }

  #drop-zone.drag-over #drop-zone-inner .drop-label {
    color: var(--text-mid);
  }

  #drop-zone-inner .drop-hint {
    font-size: 10px;
    color: #3a3a3a;
    letter-spacing: 0.3px;
  }

  #drop-folder-btn {
    width: 340px;
    padding: 11px 0;
    border: 1px solid var(--border-dim);
    border-radius: 4px;
    background: transparent;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.4px;
    cursor: pointer;
    text-align: center;
    transition: border-color var(--transition-fast) ease, color var(--transition-fast) ease, background var(--transition-fast) ease;
  }

  #drop-folder-btn:hover {
    border-color: #3a3a3a;
    color: var(--text-mid);
    background: rgba(255, 255, 255, 0.015);
  }

  /* ── Image Grid ── */

  #grid {
    display: grid;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: grid-template-columns var(--transition-grid) cubic-bezier(0.25, 0.46, 0.45, 0.94);
    background: var(--bg);
    place-items: center;
  }

  #grid.hidden {
    display: none;
  }

  #grid img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    cursor: pointer;
  }

  /* ── Per-tile remove button ── */

  .tile {
    position: relative;
    overflow: hidden;
  }

  .tile-remove {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 22px;
    height: 22px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 3px;
    color: rgba(255,255,255,0.50);
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 140ms ease, color 140ms ease, background 140ms ease;
    z-index: 5;
  }

  .tile:hover .tile-remove {
    opacity: 1;
  }

  .tile-remove:hover {
    color: var(--text-bright);
    background: rgba(0,0,0,0.80);
  }

  /* ── Controls Overlay ── */

  .controls {
    position: absolute;
    z-index: 20;
    opacity: 0;
    transition: opacity var(--transition-fast) ease;
    pointer-events: none;
  }

  .controls.visible {
    opacity: 1;
    pointer-events: auto;
  }

  /* X (close) button */
  #btn-close {
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 15px;
    cursor: pointer;
    transition: color var(--transition-fast) ease, background var(--transition-fast) ease;
    line-height: 1;
  }

  #btn-close:hover {
    color: var(--text-bright);
    background: rgba(0,0,0,0.85);
  }

  /* + (add) button */
  #btn-add {
    top: 16px;
    left: 16px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 17px;
    cursor: pointer;
    transition: color var(--transition-fast) ease, background var(--transition-fast) ease;
    line-height: 1;
  }

  #btn-add:hover {
    color: var(--text-bright);
    background: rgba(0,0,0,0.85);
  }

  /* Folder watch button */
  #btn-folder {
    top: 16px;
    left: 56px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    transition: color var(--transition-fast) ease, background var(--transition-fast) ease;
    line-height: 1;
  }

  #btn-folder:hover {
    color: var(--text-bright);
    background: rgba(0,0,0,0.85);
  }

  #btn-folder.watching {
    color: var(--accent);
  }

  /* Folder refresh button */
  #btn-refresh {
    top: 16px;
    left: 96px;
    width: 32px;
    height: 32px;
    display: none;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 15px;
    cursor: pointer;
    transition: color var(--transition-fast) ease, background var(--transition-fast) ease;
    line-height: 1;
  }

  #btn-refresh.watching {
    display: flex;
  }

  #btn-refresh:hover {
    color: var(--text-bright);
    background: rgba(0,0,0,0.85);
  }

  /* Bottom slider bar */
  #slider-bar {
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 16px;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px;
  }

  #slider-bar .slider-label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.4px;
    min-width: 18px;
    text-align: center;
  }

  /* Range slider styling */
  #col-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 3px;
    background: var(--border-dim);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  #col-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: var(--text-mid);
    border-radius: 50%;
    cursor: pointer;
    transition: background var(--transition-fast) ease;
  }

  #col-slider::-webkit-slider-thumb:hover {
    background: var(--text-bright);
  }

  #col-slider::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: var(--text-mid);
    border: none;
    border-radius: 50%;
    cursor: pointer;
  }

  #col-slider::-moz-range-thumb:hover {
    background: var(--text-bright);
  }

  /* File input hidden */
  #file-input {
    display: none;
  }

  /* Drag overlay when in grid mode */
  #grid-drop-overlay {
    position: absolute;
    inset: 0;
    z-index: 15;
    background: rgba(14, 14, 14, 0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  #grid-drop-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #grid-drop-overlay span {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* ── Focus Overlay ── */

  #focus-overlay {
    position: absolute;
    inset: 0;
    z-index: 30;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition-fast) ease;
    cursor: zoom-out;
  }

  #focus-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }

  #focus-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
    transform-origin: center center;
    transform: scale(1);
    transition: transform 80ms ease-out;
    cursor: default;
    user-select: none;
  }

  #focus-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 15px;
    cursor: pointer;
    transition: color var(--transition-fast) ease, background var(--transition-fast) ease;
    line-height: 1;
  }

  #focus-close:hover {
    color: var(--text-bright);
    background: rgba(0,0,0,0.85);
  }

  #focus-prompt {
    position: absolute;
    top: 16px;
    right: 56px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: color var(--transition-fast) ease, background var(--transition-fast) ease;
    line-height: 1;
    padding: 0;
  }

  #focus-prompt:hover,
  #focus-prompt.active {
    color: var(--text-bright);
    background: rgba(0,0,0,0.85);
  }

  #prompt-drawer {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 35;
    padding: 16px;
    background: rgba(0, 0, 0, 0.82);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-top: 1px solid rgba(255,255,255,0.08);
    transform: translateY(100%);
    transition: transform 220ms ease;
    cursor: default;
  }

  #prompt-drawer.visible {
    transform: translateY(0);
  }

  #prompt-drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  #prompt-drawer-title {
    color: var(--text-mid);
    font-size: 11px;
    letter-spacing: 0.4px;
  }

  #prompt-copy {
    padding: 7px 10px;
    background: var(--control-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: color var(--transition-fast) ease, background var(--transition-fast) ease;
  }

  #prompt-copy:hover:not(:disabled) {
    color: var(--text-bright);
    background: var(--control-hover);
  }

  #prompt-copy:disabled {
    cursor: default;
    opacity: 0.45;
  }

  #prompt-content {
    min-height: 120px;
  }

  #prompt-content.status {
    display: flex;
    align-items: center;
    color: var(--text-dim);
    font-size: 12px;
    min-height: 120px;
  }

  #prompt-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }

  .prompt-card {
    min-width: 0;
  }

  .prompt-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 7px;
  }

  .prompt-card-title {
    color: var(--text-mid);
    font-size: 10px;
    letter-spacing: 0.4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .prompt-card-close {
    width: 22px;
    height: 22px;
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    transition: color var(--transition-fast) ease, background var(--transition-fast) ease;
  }

  .prompt-card-close:hover {
    color: var(--text-bright);
    background: var(--control-hover);
  }

  .prompt-card textarea {
    width: 100%;
    height: min(34vh, 260px);
    resize: none;
    padding: 12px;
    background: rgba(8, 8, 8, 0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 3px;
    color: var(--text-bright);
    font-family: inherit;
    font-size: 12px;
    line-height: 1.5;
    outline: none;
    user-select: text;
    -webkit-user-select: text;
  }

  #focus-prev,
  #focus-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 48px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    color: var(--text-dim);
    font-size: 28px;
    font-family: inherit;
    cursor: pointer;
    opacity: 0;
    transition: opacity var(--transition-fast) ease, background var(--transition-fast) ease, color var(--transition-fast) ease;
    line-height: 1;
    padding: 0;
  }

  #focus-prev {
    left: 0;
    border-radius: 0 3px 3px 0;
  }

  #focus-next {
    right: 0;
    border-radius: 3px 0 0 3px;
  }

  #focus-overlay.focus-nav-visible #focus-prev,
  #focus-overlay.focus-nav-visible #focus-next {
    opacity: 1;
  }

  #focus-prev:hover,
  #focus-next:hover {
    opacity: 1;
    background: rgba(0,0,0,0.85);
    color: var(--text-bright);
  }

  /* ── Window chrome (Electron only) ── */
  #drag-strip {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 32px;
    -webkit-app-region: drag;
    z-index: 1000;
    pointer-events: none;
  }

  #win-controls {
    position: fixed;
    top: 0; right: 0;
    height: 32px;
    display: flex;
    align-items: center;
    -webkit-app-region: no-drag;
    z-index: 1001;
    pointer-events: all;
  }

  #win-controls button {
    width: 46px;
    height: 32px;
    background: transparent;
    border: none;
    color: var(--text-bright);
    font-family: inherit;
    font-size: 13px;
    line-height: 1;
    cursor: default;
    opacity: 0.25;
    transition: opacity var(--transition-fast), background var(--transition-fast);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }

  #win-controls button:hover { opacity: 1; }
  #win-controls .btn-close:hover { background: #c42b1c; opacity: 1; }

  /* Hide window chrome in fullscreen */
  body.fullscreen #drag-strip,
  body.fullscreen #win-controls { display: none; }

  #fullscreen-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--control-bg);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    padding: 6px 14px;
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 600ms ease;
    z-index: 2000;
    white-space: nowrap;
  }

  #fullscreen-hint.visible { opacity: 1; }

  /* ── Folder Sidebar ── */

  #sidebar-panel {
    width: var(--sidebar-width);
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--sidebar-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.15s ease;
  }

  #sidebar-panel.collapsed {
    width: 0;
    border-right: none;
  }

  .sidebar-header {
    padding: 7px 10px;
    color: #555;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--sidebar-border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    white-space: nowrap;
  }

  #btn-collapse-sidebar {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    padding: 0 2px;
    line-height: 1;
    transition: color var(--transition-fast);
  }

  #btn-collapse-sidebar:hover { color: var(--text-mid); }

  .sidebar-title { flex: 1; }

  .sidebar-sort {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-right: 4px;
  }

  #btn-sort-mode,
  #btn-sort-dir {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    padding: 1px 3px;
    line-height: 1;
    border-radius: 2px;
    transition: color var(--transition-fast), background var(--transition-fast);
  }

  #btn-sort-dir { font-size: 11px; min-width: 12px; text-align: center; }

  #btn-sort-mode:hover,
  #btn-sort-dir:hover { color: var(--text-bright); background: #1a1a1a; }

  #sidebar-tree {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 4px 0;
    min-height: 0;
  }

  #sidebar-tree::-webkit-scrollbar { width: 4px; }
  #sidebar-tree::-webkit-scrollbar-track { background: transparent; }
  #sidebar-tree::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  .sidebar-row {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    white-space: nowrap;
    transition: background var(--transition-fast);
    padding: 3px 8px;
  }

  .sidebar-row:hover { background: #1a1a1a; }

  .sidebar-row.active {
    background: var(--sidebar-active-bg);
    border-left: 2px solid var(--sidebar-active-border);
    padding-left: 6px;
  }

  .sidebar-row.active .sidebar-name { color: var(--sidebar-active-color); }
  .sidebar-row.active .sidebar-expand { color: var(--sidebar-active-color); }
  .sidebar-row.active .sidebar-icon { color: var(--sidebar-active-color); }

  .sidebar-expand {
    font-size: 9px;
    color: #444;
    width: 10px;
    text-align: center;
    flex-shrink: 0;
  }

  .sidebar-icon {
    font-size: 12px;
    flex-shrink: 0;
  }

  .sidebar-root-icon { color: var(--sidebar-root-icon); font-size: 13px; }
  .sidebar-folder-icon { color: #555; }

  .sidebar-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 12px;
    color: #a0a0a0;
  }

  .sidebar-root .sidebar-name { color: #c8c8c8; }

  .sidebar-remove {
    background: none;
    border: none;
    color: transparent;
    cursor: pointer;
    font-size: 10px;
    font-family: inherit;
    padding: 0 2px;
    line-height: 1;
    transition: color var(--transition-fast);
    flex-shrink: 0;
  }

  .sidebar-row:hover .sidebar-remove { color: #444; }
  .sidebar-remove:hover { color: var(--text-mid) !important; }

  .sidebar-warning { color: #e07040; font-size: 11px; }

  .sidebar-footer {
    padding: 8px 10px;
    border-top: 1px solid var(--sidebar-border);
    flex-shrink: 0;
  }

  #btn-add-root {
    width: 100%;
    background: none;
    border: 1px dashed #2a2a2a;
    color: #555;
    font-size: 11px;
    padding: 5px 8px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 2px;
    text-align: left;
    transition: border-color var(--transition-fast), color var(--transition-fast);
  }

  #btn-add-root:hover { border-color: #444; color: var(--text-mid); }

  /* Sidebar resize handle */
  #sidebar-resize {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background var(--transition-fast);
  }

  #sidebar-resize:hover,
  #sidebar-resize.dragging { background: #2a2a2a; }

  /* Sidebar toggle button (shown when sidebar is collapsed) */
  #btn-sidebar {
    top: 16px;
    left: 16px;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 3px;
    color: var(--text-dim);
    font-size: 15px;
    cursor: pointer;
    transition: color var(--transition-fast) ease, background var(--transition-fast) ease;
    line-height: 1;
  }

  #btn-sidebar:hover {
    color: var(--text-bright);
    background: rgba(0,0,0,0.85);
  }

  /* Shift left-side buttons right when sidebar button is visible */
  #btn-add    { left: 56px; }
  #btn-folder { left: 96px; }
  #btn-refresh { left: 136px; }

  /* When sidebar is open: hide btn-sidebar, reset left-button positions */
  body.sidebar-open #btn-sidebar { display: none; }
  body.sidebar-open #btn-add    { left: 16px; }
  body.sidebar-open #btn-folder { left: 56px; }
  body.sidebar-open #btn-refresh { left: 96px; }

  /* In browser (no Electron): hide sidebar entirely */
  body.no-electron #sidebar-panel,
  body.no-electron #sidebar-resize,
  body.no-electron #btn-sidebar { display: none !important; }
</style>
</head>
<body>

<!-- Drop Zone (initial state) -->

  <div id="drop-zone-layout">

    </div>

  </div>
</div>

<!-- Image Grid -->

<!-- Grid-mode drop overlay -->

<!-- Focus view overlay -->
<div id="focus-overlay">
  <img id="focus-img" draggable="false">
  <button id="focus-prompt" title="Show prompt">&#9998;</button>
  <div id="focus-close">&times;</div>
  <button id="focus-prev">&#8249;</button>
  <button id="focus-next">&#8250;</button>
  <section id="prompt-drawer" aria-label="Image prompt">
    <div id="prompt-drawer-header">
      <div id="prompt-drawer-title">prompt metadata</div>
      <button id="prompt-copy" type="button">copy</button>
    </div>
    <div id="prompt-content"></div>
  </section>
</div>

<!-- Controls (visible on mouse activity) -->
<div id="btn-sidebar" class="controls" title="Open folder browser">&#x29C6;</div>
<div id="btn-close" class="controls" title="Clear all">&times;</div>
<div id="btn-add" class="controls" title="Add images">+</div>
<div id="btn-folder" class="controls" title="Watch a folder">⌂</div>
<div id="btn-refresh" class="controls" title="Refresh folder">↺</div>
<div id="slider-bar" class="controls">
  <span class="slider-label" id="col-count">3</span>
  <input type="range" id="col-slider" min="1" max="10" value="3">
</div>

<input type="file" id="file-input" multiple accept="image/*">

  </div><!-- #main-area -->
</div><!-- #app-layout -->

<script>
(function () {
  const dropZone = document.getElementById('drop-zone');
  const grid = document.getElementById('grid');
  const gridDropOverlay = document.getElementById('grid-drop-overlay');
  const btnClose = document.getElementById('btn-close');
  const btnAdd = document.getElementById('btn-add');
  const btnFolder = document.getElementById('btn-folder');
  const btnRefresh = document.getElementById('btn-refresh');
  const dropFolderBtn = document.getElementById('drop-folder-btn');
  const sliderBar = document.getElementById('slider-bar');
  const colSlider = document.getElementById('col-slider');
  const colCount = document.getElementById('col-count');
  const fileInput = document.getElementById('file-input');
  const focusOverlay = document.getElementById('focus-overlay');
  const focusImg     = document.getElementById('focus-img');
  const focusClose   = document.getElementById('focus-close');
  const focusPrompt  = document.getElementById('focus-prompt');
  const focusPrev    = document.getElementById('focus-prev');
  const focusNext    = document.getElementById('focus-next');
  const promptDrawer = document.getElementById('prompt-drawer');
  const promptCopy   = document.getElementById('prompt-copy');
  const promptContent = document.getElementById('prompt-content');
  const sidebarPanel    = document.getElementById('sidebar-panel');
  const sidebarResize   = document.getElementById('sidebar-resize');
  const sidebarTree     = document.getElementById('sidebar-tree');
  const btnAddRoot      = document.getElementById('btn-add-root');
  const btnCollapse     = document.getElementById('btn-collapse-sidebar');
  const btnSidebarOpen  = document.getElementById('btn-sidebar');
  const btnSortMode     = document.getElementById('btn-sort-mode');
  const btnSortDir      = document.getElementById('btn-sort-dir');

  const controls = [btnClose, btnAdd, btnFolder, btnRefresh, sliderBar, btnSidebarOpen];
  let images = [];          // Array of { url, file, source, promptSections, promptHidden, promptLoaded }
  let userColumns = null;   // null = auto, otherwise user-set
  let hideTimer = null;
  let focusNavTimer = null;
  let dragCounter = 0;
  let focusedIdx    = -1;   // index into images[], -1 = not in focus view
  let focusZoom     = 1.0;  // current zoom scale
  let focusPanX     = 0;    // pan offset in screen px
  let focusPanY     = 0;
  let panDragging   = false;
  let panDragStartX = 0;
  let panDragStartY = 0;
  let panDragMoved  = false;

  // Folder watching state
  let folderHandle = null;
  let folderKnownFiles = new Set();
  let folderPollTimer = null;

  // ── Sidebar state ──
  let sidebarState = {
    open: false,
    width: 220,
    roots: [],        // [{ path, name, expanded, children: null|[{path,name,mtime,expanded,children}] }]
    expandedPaths: new Set(),
    activeFolder: null,
    sortMode: 'name', // 'name' | 'date'
    sortDir: 'asc',   // 'asc' | 'desc'
  };

  // ── Default column logic ──

  function defaultColumns(n) {
    if (n <= 1) return 1;
    return Math.min(Math.ceil(n / 2), 10);
  }

  function getColumns() {
    if (userColumns !== null) return userColumns;
    return defaultColumns(images.length);
  }

  // ── Render ──

  function render() {
    const n = images.length;

    if (n === 0) {
      grid.classList.add('hidden');
      dropZone.classList.remove('hidden');
      controls.forEach(c => c.classList.remove('visible'));
      // Keep sidebar toggle visible on drop zone if sidebar is closed
      if (!sidebarState.open && window.electronAPI) {
        btnSidebarOpen.classList.add('visible');
      }
      return;
    }

    dropZone.classList.add('hidden');
    grid.classList.remove('hidden');

    const cols = getColumns();
    const rows = Math.ceil(n / cols);

    grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

    // Sync slider
    colSlider.value = cols;
    colCount.textContent = cols;

    // Rebuild grid children
    grid.innerHTML = '';
    images.forEach((imgData, i) => {
      const tile = document.createElement('div');
      tile.className = 'tile';

      const el = document.createElement('img');
      el.src = imgData.url;
      el.draggable = false;
      el.addEventListener('click', () => openFocus(i));

      const removeBtn = document.createElement('button');
      removeBtn.className = 'tile-remove';
      removeBtn.textContent = '×';
      removeBtn.title = 'Remove image';
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        removeImage(i);
      });

      tile.appendChild(el);
      tile.appendChild(removeBtn);
      grid.appendChild(tile);
    });

    fitGrid(cols, rows);
  }

  // Compute row heights from image aspect ratios so rows are packed tight
  // with letterboxing only above/below the entire grid.
  function fitGrid(cols, rows) {
    const imgEls = [...grid.querySelectorAll('img')];
    if (imgEls.length === 0) return;

    const loadPromises = imgEls.map(img =>
      (img.complete && img.naturalWidth > 0)
        ? Promise.resolve()
        : new Promise(resolve => {
            img.addEventListener('load', resolve, { once: true });
            img.addEventListener('error', resolve, { once: true });
          })
    );

    Promise.all(loadPromises).then(() => {
      const mainArea = document.getElementById('main-area');
      const vw = mainArea.clientWidth;
      const vh = mainArea.clientHeight;
      const cellWidth = vw / cols;

      // Each row height = cellWidth / minAR_in_row so the most-portrait
      // image fills the full cell height (wider images are pillarboxed).
      const rowHeights = [];
      for (let r = 0; r < rows; r++) {
        let minAR = Infinity;
        for (let c = 0; c < cols; c++) {
          const idx = r * cols + c;
          if (idx < imgEls.length) {
            const ar = imgEls[idx].naturalWidth / imgEls[idx].naturalHeight;
            if (ar > 0 && ar < minAR) minAR = ar;
          }
        }
        if (!isFinite(minAR)) minAR = 1;
        rowHeights.push(cellWidth / minAR);
      }

      const naturalH = rowHeights.reduce((a, b) => a + b, 0);
      // Scale down if the packed grid is taller than the viewport
      const scale = naturalH > vh ? vh / naturalH : 1;

      grid.style.width  = `${vw * scale}px`;
      grid.style.height = `${naturalH * scale}px`;
      grid.style.gridTemplateRows = rowHeights.map(h => `${h * scale}px`).join(' ');
    });
  }

  // ── Add images ──

  function addFiles(fileList) {
    const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp', 'image/bmp', 'image/svg+xml', 'image/avif'];
    for (const file of fileList) {
      if (validTypes.includes(file.type) || file.type.startsWith('image/')) {
        images.push({
          url: URL.createObjectURL(file),
          file: file,
          source: 'manual',
          promptSections: [],
          promptHidden: [],
          promptLoaded: false
        });
      }
    }
    images.sort((a, b) => a.file.name.localeCompare(b.file.name, undefined, { numeric: true, sensitivity: 'base' }));
    render();
    showControls();
  }

  function removeImage(idx) {
    URL.revokeObjectURL(images[idx].url);
    images.splice(idx, 1);
    render();
  }

  function clearAll() {
    if (focusedIdx !== -1) closeFocus();
    stopWatching();
    images.forEach(img => URL.revokeObjectURL(img.url));
    images = [];
    userColumns = null;
    grid.innerHTML = '';
    render();
  }

  // ── Focus view ──

  function readUint32(bytes, offset) {
    return ((bytes[offset] << 24) | (bytes[offset + 1] << 16) | (bytes[offset + 2] << 8) | bytes[offset + 3]) >>> 0;
  }

  function decodeLatin1(bytes) {
    let text = '';
    for (let i = 0; i < bytes.length; i += 4096) {
      text += String.fromCharCode(...bytes.subarray(i, i + 4096));
    }
    return text;
  }

  function decodeUtf8(bytes) {
    try {
      return new TextDecoder('utf-8').decode(bytes);
    } catch (e) {
      return decodeLatin1(bytes);
    }
  }

  function cleanMetadataText(text) {
    return text
      .replace(/\r\n/g, '\n')
      .replace(/\u0000/g, '')
      .trim();
  }

  function htmlDecode(text) {
    const textarea = document.createElement('textarea');
    textarea.innerHTML = text;
    return textarea.value;
  }

  function choosePromptCandidate(entries) {
    const priorities = ['prompt', 'parameters', 'description', 'comment', 'usercomment'];

    for (const key of priorities) {
      const match = entries.find(entry => entry.keyword.toLowerCase() === key && entry.text.trim());
      if (match) return cleanMetadataText(match.text);
    }

    const fuzzy = entries.find(entry => /prompt|parameter|description|comment/i.test(entry.keyword) && entry.text.trim());
    if (fuzzy) return cleanMetadataText(fuzzy.text);

    return '';
  }

  function extractPngPrompt(buffer) {
    const bytes = new Uint8Array(buffer);
    const signature = [137, 80, 78, 71, 13, 10, 26, 10];
    if (bytes.length < signature.length || !signature.every((value, i) => bytes[i] === value)) return '';

    const entries = [];
    let offset = 8;

    while (offset + 12 <= bytes.length) {
      const length = readUint32(bytes, offset);
      const type = decodeLatin1(bytes.subarray(offset + 4, offset + 8));
      const dataStart = offset + 8;
      const dataEnd = dataStart + length;
      if (dataEnd + 4 > bytes.length) break;

      const data = bytes.subarray(dataStart, dataEnd);

      if (type === 'tEXt') {
        const split = data.indexOf(0);
        if (split > 0) {
          entries.push({
            keyword: decodeLatin1(data.subarray(0, split)),
            text: decodeLatin1(data.subarray(split + 1))
          });
        }
      }

      if (type === 'iTXt') {
        const keywordEnd = data.indexOf(0);
        if (keywordEnd > 0 && data.length > keywordEnd + 5) {
          const compressionFlag = data[keywordEnd + 1];
          let cursor = keywordEnd + 3;
          const languageEnd = data.indexOf(0, cursor);
          if (languageEnd >= 0) {
            cursor = languageEnd + 1;
            const translatedEnd = data.indexOf(0, cursor);
            if (translatedEnd >= 0 && compressionFlag === 0) {
              entries.push({
                keyword: decodeLatin1(data.subarray(0, keywordEnd)),
                text: decodeUtf8(data.subarray(translatedEnd + 1))
              });
            }
          }
        }
      }

      if (type === 'IEND') break;
      offset = dataEnd + 4;
    }

    return choosePromptCandidate(entries);
  }

  function extractPromptFromReadableText(text) {
    const cleaned = cleanMetadataText(text);
    const jsonMatch = cleaned.match(/["'](?:prompt|description|parameters)["']\s*:\s*["']([\s\S]{1,6000}?)["']/i);
    if (jsonMatch) return cleanMetadataText(jsonMatch[1].replace(/\\n/g, '\n').replace(/\\"/g, '"'));

    const xmlDescription = cleaned.match(/<dc:description[\s\S]*?<rdf:li[^>]*>([\s\S]{1,6000}?)<\/rdf:li>[\s\S]*?<\/dc:description>/i);
    if (xmlDescription) return cleanMetadataText(htmlDecode(xmlDescription[1]));

    const promptAttribute = cleaned.match(/\b(?:prompt|description|parameters)=["']([\s\S]{1,6000}?)["']/i);
    if (promptAttribute) return cleanMetadataText(htmlDecode(promptAttribute[1]));

    const lineMatch = cleaned.match(/(?:^|\n)(prompt|description|parameters)\s*[:=]\s*([^\n][\s\S]{1,6000})/i);
    if (lineMatch) return cleanMetadataText(lineMatch[2]);

    return '';
  }

  function extractPromptFromBuffer(buffer) {
    const pngPrompt = extractPngPrompt(buffer);
    if (pngPrompt) return pngPrompt;

    const metadataSlice = buffer.slice(0, Math.min(buffer.byteLength, 1024 * 1024));
    const bytes = new Uint8Array(metadataSlice);
    return extractPromptFromReadableText(decodeUtf8(bytes)) || extractPromptFromReadableText(decodeLatin1(bytes));
  }

  function parseJsonMaybe(text) {
    try {
      return JSON.parse(text);
    } catch (e) {
      return null;
    }
  }

  function getPromptTitle(node, id) {
    const title = cleanMetadataText(node && node._meta && node._meta.title ? String(node._meta.title) : '');
    const simplePrompt = title.match(/\b(true|false|negative|positive)\s+prompt\b/i);
    if (simplePrompt) {
      return `${simplePrompt[1].charAt(0).toUpperCase()}${simplePrompt[1].slice(1).toLowerCase()} Prompt`;
    }

    const parenthetical = title.match(/\(([^)]*prompt[^)]*)\)/i);
    if (parenthetical) return cleanMetadataText(parenthetical[1]);

    return title || `CLIPTextEncode ${id}`;
  }

  function extractComfyPromptSections(rawPrompt) {
    const payload = parseJsonMaybe(rawPrompt);
    if (!payload || typeof payload !== 'object') return [];

    return Object.entries(payload)
      .filter(([, node]) => node && node.class_type === 'CLIPTextEncode')
      .map(([id, node]) => ({
        id,
        title: getPromptTitle(node, id),
        text: cleanMetadataText(node.inputs && node.inputs.text != null ? String(node.inputs.text) : '')
      }))
      .filter(section => section.text);
  }

  function getPromptSections(rawPrompt) {
    const cleaned = cleanMetadataText(rawPrompt);
    if (!cleaned) return [];

    const comfySections = extractComfyPromptSections(cleaned);
    if (comfySections.length) return comfySections;

    return [{
      id: 'prompt',
      title: 'Prompt',
      text: cleaned
    }];
  }

  async function loadPromptForImage(imgData) {
    if (imgData.promptLoaded) return imgData.promptSections;

    imgData.promptLoaded = true;
    try {
      imgData.promptSections = getPromptSections(extractPromptFromBuffer(await imgData.file.arrayBuffer()));
    } catch (e) {
      imgData.promptSections = [];
    }

    return imgData.promptSections;
  }

  function setPromptDrawerVisible(visible) {
    promptDrawer.classList.toggle('visible', visible);
    focusPrompt.classList.toggle('active', visible);
  }

  function setPromptStatus(text, copyLabel) {
    promptContent.className = 'status';
    promptContent.textContent = text;
    promptCopy.disabled = true;
    promptCopy.textContent = copyLabel || 'copy';
  }

  function getVisiblePromptSections(imgData) {
    const hidden = new Set(imgData.promptHidden || []);
    return (imgData.promptSections || []).filter(section => !hidden.has(section.id));
  }

  function renderPromptSections(imgData) {
    const visibleSections = getVisiblePromptSections(imgData);
    promptCopy.disabled = visibleSections.length === 0;
    promptCopy.textContent = 'copy';

    if (!imgData.promptSections.length) {
      setPromptStatus('no embedded prompt metadata found');
      return;
    }

    if (!visibleSections.length) {
      setPromptStatus('all prompt sections hidden');
      return;
    }

    promptContent.className = '';
    promptContent.innerHTML = '';

    const gridEl = document.createElement('div');
    gridEl.id = 'prompt-grid';

    visibleSections.forEach(section => {
      const card = document.createElement('article');
      card.className = 'prompt-card';
      card.dataset.promptId = section.id;

      const header = document.createElement('div');
      header.className = 'prompt-card-header';

      const title = document.createElement('div');
      title.className = 'prompt-card-title';
      title.textContent = section.title;

      const close = document.createElement('button');
      close.className = 'prompt-card-close';
      close.type = 'button';
      close.title = `Hide ${section.title}`;
      close.textContent = 'x';
      close.addEventListener('click', (e) => {
        e.stopPropagation();
        imgData.promptHidden = [...new Set([...(imgData.promptHidden || []), section.id])];
        renderPromptSections(imgData);
      });

      const textarea = document.createElement('textarea');
      textarea.readOnly = true;
      textarea.spellcheck = false;
      textarea.value = section.text;

      header.appendChild(title);
      header.appendChild(close);
      card.appendChild(header);
      card.appendChild(textarea);
      gridEl.appendChild(card);
    });

    promptContent.appendChild(gridEl);
  }

  function updatePromptDrawerForFocusedImage() {
    if (focusedIdx === -1) return;
    const imgData = images[focusedIdx];

    if (!imgData.promptLoaded) {
      setPromptStatus('loading prompt metadata...');
      loadPromptForImage(imgData).then(() => {
        if (images[focusedIdx] !== imgData) return;
        renderPromptSections(imgData);
      });
      return;
    }

    renderPromptSections(imgData);
  }

  function applyFocusTransform() {
    focusImg.style.transform = `translate(${focusPanX}px, ${focusPanY}px) scale(${focusZoom})`;
  }

  function updateFocusCursor() {
    if (panDragging) {
      focusOverlay.style.cursor = 'grabbing';
      focusImg.style.cursor     = 'grabbing';
    } else if (focusZoom > 1) {
      focusOverlay.style.cursor = 'grab';
      focusImg.style.cursor     = 'grab';
    } else {
      focusOverlay.style.cursor = 'zoom-out';
      focusImg.style.cursor     = 'default';
    }
  }

  function openFocus(idx) {
    focusedIdx = idx;
    focusZoom  = 1.0;
    focusPanX  = 0;
    focusPanY  = 0;
    focusImg.src = images[idx].url;
    setPromptDrawerVisible(false);
    setPromptStatus('');
    applyFocusTransform();
    updateFocusCursor();
    focusOverlay.classList.add('visible');
    updateFocusNavButtons();
  }

  function closeFocus() {
    focusOverlay.classList.remove('visible');
    clearTimeout(focusNavTimer);
    focusOverlay.classList.remove('focus-nav-visible');
    setPromptDrawerVisible(false);
    setPromptStatus('');
    focusedIdx = -1;
    focusZoom  = 1.0;
    focusPanX  = 0;
    focusPanY  = 0;
    updateFocusCursor();
    setTimeout(() => {
      if (focusedIdx === -1) {
        applyFocusTransform();
        focusImg.src = '';
      }
    }, 200);
    updateFocusNavButtons();
  }

  function navigateFocus(delta) {
    const next = (focusedIdx + delta + images.length) % images.length;
    openFocus(next);
  }

  function updateFocusNavButtons() {
    const show = images.length > 1;
    focusPrev.style.display = show ? 'flex' : 'none';
    focusNext.style.display = show ? 'flex' : 'none';
  }

  // ── Folder watching ──

  const imageExts = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp', '.svg', '.avif'];

  async function activateFolderHandle(handle) {
    stopWatching();
    images = images.filter(img => {
      if (img.source === 'folder') {
        URL.revokeObjectURL(img.url);
        return false;
      }
      return true;
    });
    folderHandle = handle;
    folderKnownFiles = new Set();
    btnFolder.classList.add('watching');
    btnRefresh.classList.add('watching');
    await scanFolder();
    startWatching();
  }

  async function selectFolder() {
    if (typeof window.showDirectoryPicker !== 'function') {
      dropFolderBtn.textContent = 'requires chrome or edge';
      setTimeout(() => { dropFolderBtn.textContent = '+ watch a folder'; }, 2500);
      return;
    }
    try {
      const handle = await window.showDirectoryPicker();
      await activateFolderHandle(handle);
    } catch (e) {
      if (e.name !== 'AbortError') {
        dropFolderBtn.textContent = 'could not access folder';
        setTimeout(() => { dropFolderBtn.textContent = '+ watch a folder'; }, 2500);
      }
    }
  }

  async function scanFolder() {
    if (!folderHandle) return;
    let added = false;

    try {
      for await (const entry of folderHandle.values()) {
        if (entry.kind !== 'file') continue;
        const name = entry.name;
        if (folderKnownFiles.has(name)) continue;

        const dot = name.lastIndexOf('.');
        if (dot < 0) continue;
        const ext = name.substring(dot).toLowerCase();
        if (!imageExts.includes(ext)) continue;

        folderKnownFiles.add(name);
        try {
          const file = await entry.getFile();
          images.push({
            url: URL.createObjectURL(file),
            file: file,
            source: 'folder',
            promptSections: [],
            promptHidden: [],
            promptLoaded: false
          });
          added = true;
        } catch (e) {
          folderKnownFiles.delete(name); // retry next scan
        }
      }
    } catch (e) {
      // Permission revoked or folder deleted — stop watching
      stopWatching();
      return;
    }

    if (added) {
      images.sort((a, b) => a.file.name.localeCompare(b.file.name, undefined, { numeric: true, sensitivity: 'base' }));
      render();
      showControls();
    }
  }

  function startWatching() {
    function poll() {
      scanFolder().then(() => {
        if (folderHandle) {
          folderPollTimer = setTimeout(poll, 2000);
        }
      });
    }
    folderPollTimer = setTimeout(poll, 2000);
  }

  function stopWatching() {
    clearTimeout(folderPollTimer);
    folderPollTimer = null;
    folderHandle = null;
    folderKnownFiles = new Set();
    btnFolder.classList.remove('watching');
    btnRefresh.classList.remove('watching');
  }

  btnRefresh.addEventListener('click', () => {
    images = images.filter(img => {
      if (img.source === 'folder') {
        URL.revokeObjectURL(img.url);
        return false;
      }
      return true;
    });
    folderKnownFiles = new Set();
    render();
    scanFolder();
  });

  // ── Controls visibility ──

  function showControls() {
    if (images.length === 0) return;
    controls.forEach(c => c.classList.add('visible'));
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      // Only hide if mouse isn't over a control
      controls.forEach(c => c.classList.remove('visible'));
    }, 2000);
  }

  // Keep controls visible while hovering them
  controls.forEach(c => {
    c.addEventListener('mouseenter', () => {
      clearTimeout(hideTimer);
      controls.forEach(el => el.classList.add('visible'));
    });
    c.addEventListener('mouseleave', () => {
      hideTimer = setTimeout(() => {
        controls.forEach(el => el.classList.remove('visible'));
      }, 1200);
    });
  });

  document.addEventListener('mousemove', () => {
    if (focusedIdx !== -1) return;
    showControls();
  });

  // ── Drop zone events ──

  dropFolderBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    selectFolder();
  });

  dropZone.addEventListener('click', () => {
    fileInput.click();
  });

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
  });

  dropZone.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropZone.classList.remove('drag-over');
    // Collect getAsFileSystemHandle promises synchronously — items become
    // unavailable after the event handler returns.
    const handlePromises = [];
    if (e.dataTransfer.items) {
      for (const item of e.dataTransfer.items) {
        if (item.kind === 'file' && typeof item.getAsFileSystemHandle === 'function') {
          handlePromises.push(item.getAsFileSystemHandle());
        }
      }
    }
    if (handlePromises.length) {
      Promise.all(handlePromises).then(handles => {
        const dirHandle = handles.find(h => h.kind === 'directory');
        if (dirHandle) {
          activateFolderHandle(dirHandle);
        } else if (e.dataTransfer.files.length) {
          addFiles(e.dataTransfer.files);
        }
      });
    } else if (e.dataTransfer.files.length) {
      addFiles(e.dataTransfer.files);
    }
  });

  // ── Grid-mode drag & drop (add more images) ──

  document.addEventListener('dragover', (e) => {
    e.preventDefault();
  });

  document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    if (images.length > 0) {
      dragCounter++;
      gridDropOverlay.classList.add('visible');
    }
  });

  document.addEventListener('dragleave', (e) => {
    if (images.length > 0) {
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        gridDropOverlay.classList.remove('visible');
      }
    }
  });

  document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    gridDropOverlay.classList.remove('visible');
    // Collect getAsFileSystemHandle promises synchronously — items become
    // unavailable after the event handler returns.
    const handlePromises = [];
    if (e.dataTransfer.items) {
      for (const item of e.dataTransfer.items) {
        if (item.kind === 'file' && typeof item.getAsFileSystemHandle === 'function') {
          handlePromises.push(item.getAsFileSystemHandle());
        }
      }
    }
    if (handlePromises.length) {
      Promise.all(handlePromises).then(handles => {
        const dirHandle = handles.find(h => h.kind === 'directory');
        if (dirHandle) {
          activateFolderHandle(dirHandle);
        } else if (e.dataTransfer.files.length && images.length > 0) {
          addFiles(e.dataTransfer.files);
        }
      });
    } else if (e.dataTransfer.files.length && images.length > 0) {
      addFiles(e.dataTransfer.files);
    }
  });

  // ── File input ──

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) {
      addFiles(fileInput.files);
      fileInput.value = '';
    }
  });

  // ── Slider ──

  colSlider.addEventListener('input', () => {
    userColumns = parseInt(colSlider.value, 10);
    colCount.textContent = userColumns;
    render();
  });

  // ── Buttons ──

  btnClose.addEventListener('click', clearAll);

  btnAdd.addEventListener('click', () => {
    fileInput.click();
  });

  btnFolder.addEventListener('click', () => {
    selectFolder();
  });

  // ── Focus overlay events ──

  focusOverlay.addEventListener('click', (e) => {
    if (e.target === focusOverlay && !panDragMoved) closeFocus();
  });

  focusClose.addEventListener('click', closeFocus);

  focusPrompt.addEventListener('click', (e) => {
    e.stopPropagation();
    const nextVisible = !promptDrawer.classList.contains('visible');
    setPromptDrawerVisible(nextVisible);
    if (nextVisible) updatePromptDrawerForFocusedImage();
  });

  promptDrawer.addEventListener('click', (e) => {
    e.stopPropagation();
  });

  promptCopy.addEventListener('click', async (e) => {
    e.stopPropagation();
    if (promptCopy.disabled || focusedIdx === -1) return;

    const sections = getVisiblePromptSections(images[focusedIdx]);
    const copyText = sections.map(section => `${section.title}\n${section.text}`).join('\n\n');
    if (!copyText) return;

    try {
      if (navigator.clipboard && window.isSecureContext) {
        await navigator.clipboard.writeText(copyText);
      } else {
        const tempTextarea = document.createElement('textarea');
        tempTextarea.value = copyText;
        tempTextarea.style.position = 'fixed';
        tempTextarea.style.left = '-9999px';
        document.body.appendChild(tempTextarea);
        tempTextarea.focus();
        tempTextarea.select();
        document.execCommand('copy');
        document.body.removeChild(tempTextarea);
      }
      promptCopy.textContent = 'copied';
      setTimeout(() => { promptCopy.textContent = 'copy'; }, 1200);
    } catch (err) {
      promptCopy.textContent = 'failed';
      setTimeout(() => { promptCopy.textContent = 'copy'; }, 1200);
    }
  });

  focusOverlay.addEventListener('mousemove', () => {
    if (focusedIdx === -1) return;
    focusOverlay.classList.add('focus-nav-visible');
    clearTimeout(focusNavTimer);
    focusNavTimer = setTimeout(() => {
      focusOverlay.classList.remove('focus-nav-visible');
    }, 2000);
  });

  focusPrev.addEventListener('click', (e) => {
    e.stopPropagation();
    navigateFocus(-1);
  });

  focusNext.addEventListener('click', (e) => {
    e.stopPropagation();
    navigateFocus(+1);
  });

  focusOverlay.addEventListener('wheel', (e) => {
    if (focusedIdx === -1) return;
    e.preventDefault();
    e.stopPropagation();
    const direction = e.deltaY < 0 ? 1 : -1;
    focusZoom = Math.min(20, Math.max(0.1, focusZoom + direction * 0.12));
    if (focusZoom <= 1) { focusPanX = 0; focusPanY = 0; }
    applyFocusTransform();
    updateFocusCursor();
  }, { passive: false });

  focusOverlay.addEventListener('mousedown', (e) => {
    if (focusedIdx === -1) return;
    panDragMoved = false;
    if (
      focusZoom <= 1 ||
      e.target === focusClose ||
      e.target === focusPrompt ||
      e.target === focusPrev ||
      e.target === focusNext ||
      promptDrawer.contains(e.target)
    ) return;
    panDragging   = true;
    panDragStartX = e.clientX - focusPanX;
    panDragStartY = e.clientY - focusPanY;
    focusImg.style.transition = 'none';
    updateFocusCursor();
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!panDragging) return;
    focusPanX    = e.clientX - panDragStartX;
    focusPanY    = e.clientY - panDragStartY;
    panDragMoved = true;
    applyFocusTransform();
  });

  document.addEventListener('mouseup', () => {
    if (!panDragging) return;
    panDragging = false;
    focusImg.style.transition = '';
    updateFocusCursor();
  });

  // ── Scroll to adjust columns ──

  document.addEventListener('wheel', (e) => {
    if (images.length === 0) return;
    if (focusedIdx !== -1) return;
    e.preventDefault();
    const direction = e.deltaY > 0 ? 1 : -1;
    const current = getColumns();
    const next = Math.min(10, Math.max(1, current + direction));
    if (next === current) return;
    userColumns = next;
    colSlider.value = next;
    colCount.textContent = next;
    render();
    showControls();
  }, { passive: false });

  // ── Keyboard ──

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (focusedIdx !== -1) {
        closeFocus();
      } else {
        clearAll();
      }
    }
    if (e.key === 'b' && e.ctrlKey && !e.shiftKey && !e.altKey) {
      e.preventDefault();
      if (window.electronAPI) sidebarState.open ? closeSidebar() : openSidebar();
      return;
    }
    if (focusedIdx === -1) return;
    if (e.key === 'ArrowLeft') {
      clearTimeout(focusNavTimer);
      focusOverlay.classList.remove('focus-nav-visible');
      navigateFocus(-1);
    }
    if (e.key === 'ArrowRight') {
      clearTimeout(focusNavTimer);
      focusOverlay.classList.remove('focus-nav-visible');
      navigateFocus(+1);
    }
  });

  // ── Folder sidebar ──

  function saveSidebarState() {
    if (!window.electronAPI) return;
    window.electronAPI.saveSidebarState({
      sidebarOpen: sidebarState.open,
      sidebarWidth: sidebarState.width,
      roots: sidebarState.roots.map(r => ({ path: r.path, expanded: r.expanded })),
      expandedFolders: [...sidebarState.expandedPaths],
      activeFolder: sidebarState.activeFolder,
      sortMode: sidebarState.sortMode,
      sortDir: sidebarState.sortDir,
    });
  }

  function openSidebar() {
    sidebarState.open = true;
    sidebarPanel.classList.remove('collapsed');
    sidebarPanel.style.width = sidebarState.width + 'px';
    document.body.classList.add('sidebar-open');
    saveSidebarState();
  }

  function closeSidebar() {
    sidebarState.open = false;
    sidebarPanel.classList.add('collapsed');
    sidebarPanel.style.width = '';
    document.body.classList.remove('sidebar-open');
    saveSidebarState();
    // Re-fit grid to newly available width
    if (images.length > 0) {
      const cols = getColumns();
      const rows = Math.ceil(images.length / cols);
      fitGrid(cols, rows);
    }
  }

  async function initSidebar() {
    if (!window.electronAPI) {
      document.body.classList.add('no-electron');
      return;
    }

    const saved = await window.electronAPI.loadSidebarState();

    if (saved) {
      sidebarState.open      = saved.sidebarOpen ?? false;
      sidebarState.width     = saved.sidebarWidth ?? 220;
      sidebarState.activeFolder = null;  // always boot to empty drop zone (don't restore active folder)
      sidebarState.expandedPaths = new Set(saved.expandedFolders ?? []);
      sidebarState.sortMode  = saved.sortMode ?? 'name';
      sidebarState.sortDir   = saved.sortDir ?? 'asc';

      for (const r of (saved.roots ?? [])) {
        const result = await window.electronAPI.listDir(r.path);
        const exists = result !== null;
        sidebarState.roots.push({
          path: r.path,
          name: r.path.split(/[\\/]/).pop(),
          expanded: r.expanded ?? false,
          children: exists ? null : [],  // null = not-yet-loaded; [] = empty/inaccessible
          missing: !exists,
        });
      }
    } else {
      // First launch — open sidebar by default
      sidebarState.open = true;
    }

    if (sidebarState.open) {
      sidebarPanel.classList.remove('collapsed');
      sidebarPanel.style.width = sidebarState.width + 'px';
      document.body.classList.add('sidebar-open');
    }

    updateSortButtons();
    renderSidebar();

    // Resize handle drag
    let resizeDragging = false;
    let resizeStartX = 0;
    let resizeStartW = 0;

    sidebarResize.addEventListener('mousedown', e => {
      if (!sidebarState.open) return;
      resizeDragging = true;
      resizeStartX = e.clientX;
      resizeStartW = sidebarState.width;
      sidebarResize.classList.add('dragging');
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!resizeDragging) return;
      const delta = e.clientX - resizeStartX;
      sidebarState.width = Math.max(150, Math.min(400, resizeStartW + delta));
      sidebarPanel.style.width = sidebarState.width + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!resizeDragging) return;
      resizeDragging = false;
      sidebarResize.classList.remove('dragging');
      saveSidebarState();
      if (images.length > 0) {
        const cols = getColumns();
        const rows = Math.ceil(images.length / cols);
        fitGrid(cols, rows);
      }
    });

    btnCollapse.addEventListener('click', closeSidebar);
    btnSidebarOpen.addEventListener('click', openSidebar);
    btnAddRoot.addEventListener('click', addFolderRoot);

    btnSortMode.addEventListener('click', () => {
      sidebarState.sortMode = sidebarState.sortMode === 'name' ? 'date' : 'name';
      // Sensible default direction per field: name → A–Z (asc), date → newest (desc)
      sidebarState.sortDir = sidebarState.sortMode === 'date' ? 'desc' : 'asc';
      updateSortButtons();
      renderSidebar();
      saveSidebarState();
    });

    btnSortDir.addEventListener('click', () => {
      sidebarState.sortDir = sidebarState.sortDir === 'asc' ? 'desc' : 'asc';
      updateSortButtons();
      renderSidebar();
      saveSidebarState();
    });

    sidebarPanel.addEventListener('transitionend', () => {
      if (images.length > 0) {
        const cols = getColumns();
        const rows = Math.ceil(images.length / cols);
        fitGrid(cols, rows);
      }
    });
  }

  function renderSidebar() {
    sidebarTree.innerHTML = '';

    if (sidebarState.roots.length === 0) {
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:12px 10px;color:#444;font-size:11px;';
      empty.textContent = 'No folders added yet.';
      sidebarTree.appendChild(empty);
      return;
    }

    for (const root of sidebarState.roots) {
      sidebarTree.appendChild(buildRootRow(root));
      if (root.expanded && root.children) {
        appendChildren(sidebarTree, root.children, 1);
      }
    }
  }

  function buildRootRow(root) {
    const row = document.createElement('div');
    row.className = 'sidebar-row sidebar-root';
    row.dataset.path = root.path;

    const expand = document.createElement('span');
    expand.className = 'sidebar-expand';
    expand.textContent = root.expanded ? '▼' : '▶';

    const icon = document.createElement('span');
    icon.className = 'sidebar-icon sidebar-root-icon';
    icon.textContent = root.missing ? '⚠' : '⬡';

    const name = document.createElement('span');
    name.className = 'sidebar-name';
    name.textContent = root.name;
    name.title = root.path;

    const remove = document.createElement('button');
    remove.className = 'sidebar-remove';
    remove.textContent = '✕';
    remove.title = 'Remove root';
    remove.addEventListener('click', e => { e.stopPropagation(); removeFolderRoot(root.path); });

    row.appendChild(expand);
    row.appendChild(icon);
    row.appendChild(name);
    row.appendChild(remove);

    if (!root.missing) {
      row.addEventListener('click', () => expandFolder(root.path));
    }

    return row;
  }

  function buildFolderRow(folder, depth) {
    const row = document.createElement('div');
    row.className = 'sidebar-row sidebar-folder';
    row.dataset.path = folder.path;
    if (folder.path === sidebarState.activeFolder) row.classList.add('active');

    const indent = document.createElement('span');
    indent.style.cssText = `width:${depth * 16}px;flex-shrink:0;`;

    const expand = document.createElement('span');
    expand.className = 'sidebar-expand';
    expand.textContent = folder.children && folder.children.length > 0
      ? (folder.expanded ? '▼' : '▶')
      : ' ';

    const icon = document.createElement('span');
    icon.className = 'sidebar-icon sidebar-folder-icon';
    icon.textContent = '□';

    const name = document.createElement('span');
    name.className = 'sidebar-name';
    name.textContent = folder.name;
    name.title = folder.path;

    row.appendChild(indent);
    row.appendChild(expand);
    row.appendChild(icon);
    row.appendChild(name);

    row.addEventListener('click', (e) => {
      e.stopPropagation();
      // Single-click: load images. Expand/collapse handled separately.
      if (folder.children === null || folder.children.length > 0) {
        expandFolder(folder.path);
      }
      openFolder(folder.path);
    });

    return row;
  }

  function sortedFolders(children) {
    const dir = sidebarState.sortDir === 'asc' ? 1 : -1;
    const arr = [...children];
    if (sidebarState.sortMode === 'date') {
      arr.sort((a, b) => ((a.mtime ?? 0) - (b.mtime ?? 0)) * dir);
    } else {
      arr.sort((a, b) =>
        a.name.localeCompare(b.name, undefined, { numeric: true, sensitivity: 'base' }) * dir);
    }
    return arr;
  }

  function updateSortButtons() {
    if (!btnSortMode || !btnSortDir) return;
    btnSortMode.textContent = sidebarState.sortMode;
    if (sidebarState.sortMode === 'date') {
      btnSortDir.textContent = sidebarState.sortDir === 'asc' ? '↑' : '↓';
      btnSortDir.title = sidebarState.sortDir === 'asc' ? 'Oldest first' : 'Newest first';
    } else {
      btnSortDir.textContent = sidebarState.sortDir === 'asc' ? '↓' : '↑';
      btnSortDir.title = sidebarState.sortDir === 'asc' ? 'A–Z' : 'Z–A';
    }
    btnSortMode.title = sidebarState.sortMode === 'name'
      ? 'Sorting by name — click for date'
      : 'Sorting by date — click for name';
  }

  function appendChildren(container, children, depth) {
    if (!children) return;
    for (const child of sortedFolders(children)) {
      container.appendChild(buildFolderRow(child, depth));
      if (child.expanded && child.children) {
        appendChildren(container, child.children, depth + 1);
      }
    }
  }

  async function addFolderRoot() {
    if (!window.electronAPI) return;
    const result = await window.electronAPI.pickFolderRoot();
    if (!result) return;

    // Don't add duplicate roots
    if (sidebarState.roots.some(r => r.path === result.path)) return;

    sidebarState.roots.push({
      path: result.path,
      name: result.name,
      expanded: false,
      children: null,
      missing: false,
    });

    renderSidebar();
    saveSidebarState();
  }

  function removeFolderRoot(rootPath) {
    sidebarState.roots = sidebarState.roots.filter(r => r.path !== rootPath);

    // Clear active folder if it was inside this root
    if (sidebarState.activeFolder && sidebarState.activeFolder.startsWith(rootPath)) {
      sidebarState.activeFolder = null;
    }

    renderSidebar();
    saveSidebarState();
  }

  function findNodeByPath(nodes, targetPath) {
    for (const node of nodes) {
      if (node.path === targetPath) return node;
      if (node.children) {
        const found = findNodeByPath(node.children, targetPath);
        if (found) return found;
      }
    }
    return null;
  }

  async function expandFolder(folderPath) {
    // Find the node (could be a root or nested folder)
    const allNodes = sidebarState.roots;
    const node = findNodeByPath(allNodes, folderPath)
      ?? allNodes.find(r => r.path === folderPath);
    if (!node) return;

    // Load children if not yet loaded
    if (node.children === null) {
      const result = await window.electronAPI.listDir(node.path);
      if (result === null) {
        node.children = [];
      } else {
        node.children = result.dirs.map(d => ({
          path: d.path,
          name: d.name,
          mtime: d.mtime ?? 0,
          expanded: sidebarState.expandedPaths.has(d.path),
          children: null,
        }));
      }
    }

    // Toggle expanded
    node.expanded = !node.expanded;
    if (node.expanded) {
      sidebarState.expandedPaths.add(folderPath);
    } else {
      sidebarState.expandedPaths.delete(folderPath);
    }

    renderSidebar();
    saveSidebarState();
  }

  async function openFolder(folderPath, restoring = false) {
    if (!window.electronAPI) return;

    const result = await window.electronAPI.listDir(folderPath);
    if (result === null) {
      // Folder inaccessible — update node to missing if found
      renderSidebar();
      return;
    }

    // Replace grid images with this folder's images
    if (focusedIdx !== -1) closeFocus();
    stopWatching();
    images.forEach(img => {
      // Only revoke blob URLs (not local-file:// protocol URLs)
      if (img.url.startsWith('blob:')) URL.revokeObjectURL(img.url);
    });
    images = [];
    userColumns = null;

    for (const filePath of result.files) {
      const filename = filePath.split(/[\\/]/).pop();
      images.push({
        url: 'local-file://' + encodeURIComponent(filePath),
        file: { name: filename },
        source: 'sidebar',
        promptSections: [],
        promptHidden: [],
        promptLoaded: false,
      });
    }

    images.sort((a, b) =>
      a.file.name.localeCompare(b.file.name, undefined, { numeric: true, sensitivity: 'base' })
    );

    sidebarState.activeFolder = folderPath;
    renderSidebar();

    if (!restoring) saveSidebarState();

    render();
    if (!restoring) showControls();
  }

  // ── Resize ──

  window.addEventListener('resize', () => {
    if (images.length > 0) {
      const cols = getColumns();
      const rows = Math.ceil(images.length / cols);
      fitGrid(cols, rows);
    }
  });

  // ── Init ──
  render();
  initSidebar();

  // ── Electron window controls ──
  if (window.electronAPI) {
    const btnMin   = document.querySelector('.btn-min');
    const btnMax   = document.querySelector('.btn-max');
    const btnClose = document.querySelector('.btn-close');
    const hint     = document.getElementById('fullscreen-hint');

    btnMin.addEventListener('click',   () => window.electronAPI.minimize());
    btnMax.addEventListener('click',   () => window.electronAPI.maximize());
    btnClose.addEventListener('click', () => window.electronAPI.close());

    window.electronAPI.onMaximizeChange(isMax => {
      btnMax.innerHTML = isMax ? '&#x29C9;' : '&#x25a1;';
      btnMax.title     = isMax ? 'Restore' : 'Maximise';
    });

    window.electronAPI.onFullscreenChange(isFs => {
      document.body.classList.toggle('fullscreen', isFs);
      if (isFs) {
        setTimeout(() => {
          hint.classList.add('visible');
          setTimeout(() => hint.classList.remove('visible'), 1500);
        }, 500);
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'F11') { e.preventDefault(); window.electronAPI.toggleFullscreen(); }
    });
  }
})();
</script>
</body>
</html>
